[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False

# Ignore decorator and dynamic type issues
# The @tool decorator from chuk-mcp-server has complex typing
# CatalogManager methods are called on `object` typed params
disable_error_code = arg-type, attr-defined, union-attr, return-value, no-any-return

[mypy-chuk_mcp_server.*]
ignore_missing_imports = True

[mypy-chuk_artifacts.*]
ignore_missing_imports = True

[mypy-rasterio.*]
ignore_missing_imports = True

[mypy-pystac_client.*]
ignore_missing_imports = True

[mypy-pystac.*]
ignore_missing_imports = True

[mypy-pyproj.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-planetary_computer.*]
ignore_missing_imports = True
