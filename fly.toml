# fly.toml app configuration file generated for chuk-mcp-stac on 2026-03-01T01:45:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chuk-mcp-stac'
primary_region = 'cdg'

[build]

[env]
  GDAL_HTTP_TIMEOUT = '30'
  MCP_SERVER_MODE = 'http'
  PYTHONDONTWRITEBYTECODE = '1'
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8002
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
